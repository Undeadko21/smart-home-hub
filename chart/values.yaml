# Default values for Smart Kiosk application

image:
  repository: smart-kiosk
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

# Home Assistant configuration
ha_url: ""
ha_token: ""

# DeepSeek AI configuration
deepseek_key: ""

# Resource limits
resources:
  limits:
    cpu: "1.0"
    memory: "512M"
  requests:
    cpu: "0.25"
    memory: "128M"

# Storage configuration
storage:
  hostPath: "/mnt/data/smart-kiosk"
  containerPath: "/app/data"

# Persistence settings
persistence:
  enabled: true
  size: "1Gi"

# Security settings
securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true
  allowPrivilegeEscalation: false

# Health check settings
healthcheck:
  interval: 30s
  timeout: 5s
  retries: 3
  startPeriod: 10s
