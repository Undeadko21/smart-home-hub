# Smart Kiosk - Configuration Questions for TrueNAS SCALE ix-app (Docker Compose)
# Этот файл используется для создания пользовательского интерфейса настройки приложения

groups:
  - name: "Basic Configuration"
    description: "Основные настройки приложения"
    questions:
      - variable: "PORT"
        label: "Порт приложения"
        description: "Порт для доступа к веб-интерфейсу Smart Kiosk"
        type: int
        default: 8080
        required: true
        min: 1
        max: 65535
      
      - variable: "DATA_PATH"
        label: "Путь хранения данных"
        description: "Директория на хосте для хранения базы данных, логов и кэша"
        type: path
        default: "/mnt/data/smart-kiosk"
        required: true
      
      - variable: "CPU_LIMIT"
        label: "Лимит CPU"
        description: "Максимальное количество CPU ядер для использования"
        type: string
        default: "1.0"
        required: true
      
      - variable: "MEMORY_LIMIT"
        label: "Лимит памяти"
        description: "Максимальный объем оперативной памяти (например, 512M, 1G)"
        type: string
        default: "512M"
        required: true

  - name: "Home Assistant Integration"
    description: "Настройки интеграции с Home Assistant"
    questions:
      - variable: "HA_URL"
        label: "Home Assistant URL"
        description: "URL вашего сервера Home Assistant (например, http://192.168.1.100:8123)"
        type: url
        default: ""
        required: false
      
      - variable: "HA_TOKEN"
        label: "Home Assistant Token"
        description: "Long-Lived Access Token для доступа к API Home Assistant"
        type: password
        default: ""
        required: false
        masked: true

  - name: "AI Settings"
    description: "Настройки AI ассистента"
    questions:
      - variable: "DEEPSEEK_KEY"
        label: "DeepSeek API Key"
        description: "API ключ для сервиса DeepSeek (AI ассистент)"
        type: password
        default: ""
        required: false
        masked: true

  - name: "Docker Compose Settings"
    description: "Настройки Docker Compose для TrueNAS SCALE"
    questions:
      - variable: "COMPOSE_PROJECT_NAME"
        label: "Имя проекта Docker Compose"
        description: "Имя проекта для Docker Compose (используется для именования контейнеров)"
        type: string
        default: "smart-kiosk"
        required: true
      
      - variable: "RESTART_POLICY"
        label: "Политика перезапуска"
        description: "Политика перезапуска контейнера при сбоях"
        type: choices
        default: "unless-stopped"
        required: true
        choices:
          - value: "always"
            label: "Always (всегда)"
          - value: "unless-stopped"
            label: "Unless Stopped (если не остановлен)"
          - value: "on-failure"
            label: "On Failure (при ошибке)"
          - value: "no"
            label: "No (нет)"
      
      - variable: "DISABLE_HEALTHCHECK"
        label: "Отключить проверку здоровья"
        description: "Деактивировать health check для мониторинга состояния контейнера"
        type: boolean
        default: false
        required: true
      
      - variable: "LOG_DRIVER"
        label: "Драйвер логирования"
        description: "Драйвер для управления логами контейнера"
        type: choices
        default: "json-file"
        required: true
        choices:
          - value: "json-file"
            label: "JSON File (стандартный)"
          - value: "journald"
            label: "Journald (системный журнал)"
          - value: "none"
            label: "None (отключено)"
      
      - variable: "MAX_LOG_SIZE"
        label: "Максимальный размер логов"
        description: "Максимальный размер файла логов перед ротацией (например, 10m, 100m)"
        type: string
        default: "10m"
        required: true
      
      - variable: "MAX_LOG_FILES"
        label: "Количество файлов логов"
        description: "Максимальное количество файлов логов для хранения"
        type: int
        default: 3
        required: true
        min: 1
        max: 10
