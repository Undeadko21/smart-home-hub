<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Smart Kiosk</title>
<style>
body{margin:0;font-family:system-ui;background:#0f172a;color:#e2e8f0;min-height:100vh;padding:16px}
.card{background:#1e293b;border-radius:16px;padding:20px;max-width:500px;margin:0 auto}
h1{text-align:center;margin:0 0 16px;font-size:1.4rem}
.btn{display:block;width:100%;padding:14px;margin:8px 0;border:none;border-radius:10px;background:#3b82f6;color:#fff;font-size:1rem;cursor:pointer}
.btn:active{transform:scale(.98)}
.btn.ok{background:#22c55e}.btn.warn{background:#f59e0b;color:#000}.btn.purple{background:#a855f7}
#out{background:#0f172a;border-radius:8px;padding:12px;margin-top:16px;font-family:monospace;font-size:.85rem;white-space:pre-wrap;max-height:200px;overflow:auto}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.75rem;margin-left:8px}
.badge.ok{background:rgba(34,197,94,.2);color:#22c55e}.badge.err{background:rgba(239,68,68,.2);color:#ef4444}
.device{background:#334155;border-radius:8px;padding:12px;margin:8px 0;display:flex;justify-content:space-between;align-items:center}
.device-name{font-weight:600}
.device-state{font-size:.85rem;color:#94a3b8}
.toggle{width:50px;height:28px;background:#475569;border-radius:14px;position:relative;cursor-pointer;transition:.3s}
.toggle.on{background:#22c55e}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:24px;height:24px;background:#fff;border-radius:50%;transition:.3s}
.toggle.on::after{left:24px}
.section{margin:16px 0}
.section-title{font-size:1rem;font-weight:600;margin-bottom:8px;color:#94a3b8}
select,input{background:#334155;border:none;border-radius:6px;padding:8px;color:#fff;width:100%;box-sizing:border-box}
</style>
</head>
<body>
<div class="card">
<h1>🏠 Smart Kiosk <span id="badge" class="badge err">⏳</span></h1>

<button class="btn" onclick="doHealth()">🩺 Статус</button>
<button class="btn purple" onclick="loadAllDevices()">📋 Все устройства</button>
<button class="btn ok" onclick="showDomain('light')">💡 Свет</button>
<button class="btn" onclick="showDomain('switch')">🔌 Розетки</button>
<button class="btn" onclick="showDomain('climate')">🌡 Климат</button>
<button class="btn" onclick="showDomain('cover')">🪟 Шторы</button>
<button class="btn warn" onclick="doNotify()">🔔 Тест</button>

<div id="deviceList" class="section" style="display:none"></div>

<div id="aiBox" style="display:none;margin:12px 0">
<input type="text" id="q" placeholder="Вопрос..." style="width:100%;padding:10px;border-radius:6px;border:none;background:#334155;color:#fff;margin-bottom:8px">
<button class="btn" onclick="sendAI()">Отправить</button>
</div>

<pre id="out">Нажмите кнопку...</pre>
</div>

<script>
const $=id=>document.getElementById(id);
const log=m=>{const o=$('out');o.textContent+=(o.textContent?'\n':'')+m;o.scrollTop=o.scrollHeight;};
const api=(p,m='GET',b)=>fetch(p,{method:m,headers:{'Content-Type':'application/json'},body:b?JSON.stringify(b):null}).then(r=>r.json()).catch(e=>{log('❌ '+e.message);return null;});

let allDevices = [];

async function doHealth(){
  log('🔄 Проверка...');
  const h=await api('/api/health');
  if(!h)return;
  $('badge').className='badge '+(h.status==='ok'?'ok':'err');
  $('badge').textContent=h.ha==='configured'?'🔌HA:OK':'🔌HA:—';
  log('✅ Статус: '+h.status+' | HA: '+h.ha+' | AI: '+h.ai);
}

async function loadAllDevices(){
  log('🔄 Загрузка всех устройств...');
  const e=await api('/api/ha/entities');
  if(!e||!Array.isArray(e)){log('❌ Нет ответа от HA');return;}
  allDevices = e;
  renderDeviceList(e);
  log('✅ Найдено устройств: '+e.length);
}

function showDomain(domain){
  if(!allDevices.length){
    log('🔄 Сначала загрузите все устройства');
    loadAllDevices().then(()=>filterByDomain(domain));
  }else{
    filterByDomain(domain);
  }
}

function filterByDomain(domain){
  const filtered = allDevices.filter(d => d.entity_id.startsWith(domain + '.'));
  renderDeviceList(filtered);
  log('💡 Показано '+filtered.length+' устройств ['+domain+']');
}

function renderDeviceList(devices){
  const container = $('deviceList');
  container.innerHTML = '';
  container.style.display = 'block';
  
  if(!devices.length){
    container.innerHTML = '<div style="padding:20px;text-align:center;color:#64748b">Нет устройств</div>';
    return;
  }
  
  devices.slice(0, 50).forEach(dev => {
    const div = document.createElement('div');
    div.className = 'device';
    
    const isOn = dev.state === 'on' || dev.state === 'open' || dev.state === 'heating' || dev.state === 'cooling';
    const supportsToggle = ['light','switch'].some(d => dev.entity_id.startsWith(d + '.'));
    
    div.innerHTML = `
      <div>
        <div class="device-name">${dev.attributes?.friendly_name || dev.entity_id}</div>
        <div class="device-state">${dev.state}${dev.attributes?.unit_of_measurement ? ' ('+dev.attributes.unit_of_measurement+')' : ''}</div>
      </div>
      ${supportsToggle ? `<div class="toggle ${isOn?'on':''}" onclick="toggleDevice('${dev.entity_id}', this)"></div>` : ''}
    `;
    container.appendChild(div);
  });
}

async function toggleDevice(entityId, el){
  const domain = entityId.split('.')[0];
  log('🔄 Переключаю: '+entityId);
  const r=await api('/api/ha/call_service','POST',{domain:domain,service:'toggle',data:{entity_id:entityId}});
  if(r?.status==='ok'){
    el.classList.toggle('on');
    setTimeout(()=>refreshDeviceState(entityId), 500);
  }
  log(r?.status==='ok'?'✅ Успех':'⚠️ '+JSON.stringify(r));
}

async function refreshDeviceState(entityId){
  const state = await api(`/api/ha/entity/${entityId}`);
  if(state){
    const filtered = allDevices.filter(d => d.entity_id === entityId);
    if(filtered.length) filtered[0].state = state.state;
    if(state.attributes?.friendly_name) filtered[0].attributes = state.attributes;
    const domain = entityId.split('.')[0];
    filterByDomain(domain);
  }
}

function doAI(){
  const b=$('aiBox');
  b.style.display=b.style.display==='none'?'block':'none';
  if(b.style.display==='block')$('q').focus();
}

async function sendAI(){
  const q=$('q').value.trim();
  if(!q)return;
  $('q').value='';
  log('👤 '+q);
  log('🤖 Думаю...');
  const r=await api('/api/ai/query','POST',{messages:[{role:'user',content:q}]});
  if(!r)return;
  if(r.error){log('❌ '+r.error);return;}
  const a=r.choices?.[0]?.message?.content;
  log('🤖 '+(a||JSON.stringify(r)));
}

async function doNotify(){
  log('📬 Отправка...');
  const r=await api('/api/notify/test','POST',{provider:'ntfy',title:'Kiosk',message:'Test '+new Date().toLocaleTimeString()});
  log(r?.status==='queued'?'✅ В очереди':'⚠️ '+JSON.stringify(r));
}

// Авто-старт
setTimeout(doHealth,300);
if(document.documentElement.requestFullscreen)document.documentElement.requestFullscreen().catch(()=>{});
</script>
</body>
</html>
