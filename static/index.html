<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1">
<title>Smart Home Kiosk</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<style>
:root{
--md-sys-color-primary:#6750A4;
--md-sys-color-on-primary:#FFFFFF;
--md-sys-color-primary-container:#EADDFF;
--md-sys-color-on-primary-container:#21005D;
--md-sys-color-secondary:#625B71;
--md-sys-color-secondary-container:#E8DEF8;
--md-sys-color-on-secondary-container:#1D192B;
--md-sys-color-tertiary:#7D5260;
--md-sys-color-tertiary-container:#FFD8E4;
--md-sys-color-on-tertiary-container:#31111D;
--md-sys-color-error:#B3261E;
--md-sys-color-background:#0F0F13;
--md-sys-color-on-background:#E6E1E5;
--md-sys-color-surface:#1A1A20;
--md-sys-color-surface-variant:#2D2D35;
--md-sys-color-on-surface:#E6E1E5;
--md-sys-color-on-surface-variant:#CAC4D0;
--md-sys-color-outline:#5C5962;
--md-sys-color-success:#4CAF50;
--md-sys-color-warning:#FF9800;
--md-elevation-1:0 1px 2px rgba(0,0,0,0.3),0 1px 3px 1px rgba(0,0,0,0.15);
--md-elevation-2:0 4px 8px rgba(0,0,0,0.4),0 8px 16px rgba(0,0,0,0.2);
--md-elevation-3:0 8px 24px rgba(0,0,0,0.5),0 16px 48px rgba(0,0,0,0.3);
--md-shape-corner-small:12px;
--md-shape-corner-medium:16px;
--md-shape-corner-large:24px;
--md-shape-corner-full:999px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Roboto',system-ui,sans-serif;background:var(--md-sys-color-background);color:var(--md-sys-color-on-background);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* App Bar */
.app-bar{background:var(--md-sys-color-surface);padding:16px 24px;display:flex;justify-content:space-between;align-items:center;box-shadow:var(--md-elevation-1);position:sticky;top:0;z-index:100}
.app-bar-left{display:flex;align-items:center;gap:16px}
.app-title{font-size:1.5rem;font-weight:700;color:var(--md-sys-color-on-surface);display:flex;align-items:center;gap:12px}
.status-chip{padding:8px 16px;border-radius:var(--md-shape-corner-full);font-size:.8rem;font-weight:500;display:flex;align-items:center;gap:8px;transition:all .3s}
.status-chip.ok{background:rgba(76,175,80,.15);color:var(--md-sys-color-success);box-shadow:0 0 20px rgba(76,175,80,.2)}
.status-chip.err{background:rgba(179,38,30,.15);color:var(--md-sys-color-error)}
.app-bar-actions{display:flex;gap:12px}
.icon-btn{background:var(--md-sys-color-surface-variant);border:none;color:var(--md-sys-color-on-surface);width:48px;height:48px;border-radius:var(--md-shape-corner-full);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
.icon-btn:hover{background:var(--md-sys-color-primary);color:var(--md-sys-color-on-primary);transform:scale(1.05)}
.icon-btn:active{transform:scale(.95)}
.icon-btn.primary{background:var(--md-sys-color-primary);color:var(--md-sys-color-on-primary)}
.icon-btn.primary:hover{background:#7E6AB8}

/* Main Content - AI First Layout */
.main-content{flex:1;display:flex;overflow:hidden;position:relative}

/* AI Assistant Panel - Main Focus */
.ai-panel{flex:1;display:flex;flex-direction:column;padding:24px;max-width:900px;margin:0 auto;width:100%;transition:opacity .3s}
.ai-panel.hidden{opacity:0;pointer-events:none;position:absolute}
.ai-header{text-align:center;margin-bottom:24px}
.ai-avatar{width:80px;height:80px;border-radius:var(--md-shape-corner-full);background:linear-gradient(135deg,var(--md-sys-color-primary),var(--md-sys-color-tertiary));display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:0 0 40px rgba(103,80,164,.4);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 40px rgba(103,80,164,.4)}50%{box-shadow:0 0 60px rgba(103,80,164,.6)}}
.ai-avatar .material-icons-round{font-size:40px;color:var(--md-sys-color-on-primary)}
.ai-greeting{font-size:1.5rem;font-weight:500;color:var(--md-sys-color-on-surface);margin-bottom:8px}
.ai-subtitle{font-size:.95rem;color:var(--md-sys-color-on-surface-variant)}

/* Chat Messages - LLM Style */
.chat-messages{flex:1;overflow-y:auto;padding:16px;margin-bottom:24px;display:flex;flex-direction:column;gap:16px}
.message{padding:16px 20px;border-radius:var(--md-shape-corner-large);max-width:85%;line-height:1.6;animation:slideIn .3s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.message.user{background:var(--md-sys-color-primary);color:var(--md-sys-color-on-primary);margin-left:auto;border-bottom-right-radius:4px;box-shadow:var(--md-elevation-2)}
.message.ai{background:var(--md-sys-color-surface);color:var(--md-sys-color-on-surface);border:1px solid var(--md-sys-color-surface-variant);box-shadow:var(--md-elevation-1)}
.message.ai strong{color:var(--md-sys-color-primary-container)}
.message.system{background:transparent;text-align:center;color:var(--md-sys-color-on-surface-variant);font-size:.85rem;padding:8px}
.message.typing{display:flex;gap:4px;align-items:center}
.message.typing .dot{width:8px;height:8px;background:var(--md-sys-color-on-surface-variant);border-radius:50%;animation:typing 1.4s infinite}
.message.typing .dot:nth-child(2){animation-delay:.2s}
.message.typing .dot:nth-child(3){animation-delay:.4s}
@keyframes typing{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}

/* Input Area */
.input-area{display:flex;gap:12px;align-items:center;background:var(--md-sys-color-surface);padding:12px;border-radius:var(--md-shape-corner-full);box-shadow:var(--md-elevation-2)}
.chat-input{flex:1;padding:14px 20px;border:none;background:transparent;color:var(--md-sys-color-on-surface);font-size:1rem;outline:none}
.chat-input::placeholder{color:var(--md-sys-color-on-surface-variant)}
.send-btn{width:48px;height:48px;border-radius:var(--md-shape-corner-full);background:var(--md-sys-color-primary);color:var(--md-sys-color-on-primary);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
.send-btn:hover{background:#7E6AB8;transform:scale(1.05)}
.send-btn:active{transform:scale(.95)}

/* Widgets Sidebar */
.widgets-sidebar{width:380px;background:var(--md-sys-color-surface);border-left:1px solid var(--md-sys-color-surface-variant);display:flex;flex-direction:column;transition:transform .3s}
.widgets-sidebar.hidden{transform:translateX(100%);position:absolute;right:0;height:100%}
.widgets-header{padding:20px 24px;border-bottom:1px solid var(--md-sys-color-surface-variant);display:flex;justify-content:space-between;align-items:center}
.widgets-title{font-size:1.1rem;font-weight:600;color:var(--md-sys-color-on-surface);display:flex;align-items:center;gap:8px}
.widgets-content{flex:1;overflow-y:auto;padding:16px}

/* Enhanced Widget Cards */
.widgets-grid{display:grid;grid-template-columns:1fr;gap:12px}
.widget-card{background:var(--md-sys-color-surface-variant);border-radius:var(--md-shape-corner-medium);padding:16px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.widget-card:hover{background:var(--md-sys-color-secondary-container);transform:translateX(-4px);box-shadow:var(--md-elevation-2)}
.widget-card:active{transform:translateX(-2px) scale(.98)}
.widget-card.active{background:linear-gradient(135deg,var(--md-sys-color-primary),var(--md-sys-color-tertiary));box-shadow:0 4px 20px rgba(103,80,164,.4)}
.widget-card.active .widget-icon{color:var(--md-sys-color-on-primary)}
.widget-card.active .widget-name{color:var(--md-sys-color-on-primary)}
.widget-card.active .widget-state{color:rgba(255,255,255,.8)}
.widget-icon{width:48px;height:48px;border-radius:var(--md-shape-corner-small);background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.widget-icon .material-icons-round{font-size:24px;color:var(--md-sys-color-on-surface-variant)}
.widget-info{flex:1;min-width:0}
.widget-name{font-weight:600;font-size:.95rem;color:var(--md-sys-color-on-surface);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.widget-state{font-size:.8rem;color:var(--md-sys-color-on-surface-variant)}
.widget-action-btn{width:40px;height:40px;border-radius:var(--md-shape-corner-full);background:rgba(255,255,255,.1);border:none;color:var(--md-sys-color-on-surface);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0}
.widget-card.active .widget-action-btn{background:rgba(255,255,255,.2);color:var(--md-sys-color-on-primary)}
.widget-action-btn:hover{background:var(--md-sys-color-primary);color:var(--md-sys-color-on-primary)}
.widget-remove{position:absolute;top:8px;right:8px;width:28px;height:28px;border-radius:var(--md-shape-corner-full);background:rgba(179,38,30,.2);display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:all .2s}
.widget-card:hover .widget-remove{opacity:1}
.widget-remove:hover{background:var(--md-sys-color-error)}
.widget-remove .material-icons-round{font-size:16px;color:var(--md-sys-color-error)}

/* Quick Actions */
.quick-actions{padding:16px 24px;border-top:1px solid var(--md-sys-color-surface-variant)}
.quick-actions-title{font-size:.75rem;font-weight:500;color:var(--md-sys-color-on-surface-variant);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.quick-buttons{display:flex;flex-wrap:wrap;gap:8px}
.quick-btn{padding:10px 16px;border-radius:var(--md-shape-corner-full);background:var(--md-sys-color-surface-variant);border:none;color:var(--md-sys-color-on-surface);font-size:.85rem;font-weight:500;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:8px}
.quick-btn:hover{background:var(--md-sys-color-primary);color:var(--md-sys-color-on-primary)}
.quick-btn .material-icons-round{font-size:18px}

/* Add Widget Button */
.add-widget-card{border:2px dashed var(--md-sys-color-outline);background:transparent;border-radius:var(--md-shape-corner-medium);padding:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;min-height:80px}
.add-widget-card:hover{border-color:var(--md-sys-color-primary);background:rgba(103,80,164,.1)}
.add-widget-card .material-icons-round{font-size:32px;color:var(--md-sys-color-on-surface-variant);margin-bottom:8px}
.add-widget-card span{font-size:.85rem;color:var(--md-sys-color-on-surface-variant);font-weight:500}

/* Dialog */
.dialog-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:400;backdrop-filter:blur(4px)}
.dialog-overlay.show{display:flex}
.dialog{background:var(--md-sys-color-surface);border-radius:var(--md-shape-corner-large);padding:24px;max-width:480px;width:90%;max-height:80vh;overflow-y:auto;box-shadow:var(--md-elevation-3)}
.dialog-title{font-size:1.25rem;font-weight:600;color:var(--md-sys-color-on-surface);margin-bottom:8px}
.dialog-subtitle{color:var(--md-sys-color-on-surface-variant);font-size:.9rem;margin-bottom:20px}
.dialog-list{max-height:300px;overflow-y:auto}
.dialog-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:24px}
.btn-filled{background:var(--md-sys-color-primary);color:var(--md-sys-color-on-primary);border:none;padding:12px 24px;border-radius:var(--md-shape-corner-full);font-weight:500;cursor:pointer;transition:background .2s}
.btn-filled:hover{background:#7E6AB8}
.btn-text{background:transparent;color:var(--md-sys-color-on-surface-variant);border:none;padding:12px 24px;border-radius:var(--md-shape-corner-full);font-weight:500;cursor:pointer}
.btn-text:hover{background:var(--md-sys-color-surface-variant)}

/* Snackbar */
.snackbar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--md-sys-color-primary);color:var(--md-sys-color-on-primary);padding:14px 24px;border-radius:var(--md-shape-corner-full);box-shadow:var(--md-elevation-3);opacity:0;transition:all .3s;z-index:500;white-space:nowrap;font-weight:500}
.snackbar.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Empty State */
.empty-state{text-align:center;padding:40px 24px;color:var(--md-sys-color-on-surface-variant)}
.empty-state .material-icons-round{font-size:56px;margin-bottom:16px;opacity:.3}
.empty-state-title{font-size:1.1rem;font-weight:500;margin-bottom:8px;color:var(--md-sys-color-on-surface)}
.empty-state-text{font-size:.9rem}

/* Responsive */
@media(max-width:1024px){
.main-content{flex-direction:column}
.widgets-sidebar{width:100%;height:auto;max-height:50%;border-left:none;border-top:1px solid var(--md-sys-color-surface-variant);position:static;transform:none}
.widgets-sidebar.hidden{display:none}
.ai-panel{padding:16px}
}
</style>
</head>
<body>
<!-- App Bar -->
<div class="app-bar">
<div class="app-bar-left">
<span class="material-icons-round" style="color:var(--md-sys-color-primary);font-size:32px">home</span>
<h1 class="app-title">Smart Home</h1>
<span id="statusBadge" class="status-chip err">
<span class="material-icons-round" style="font-size:16px">error</span>
<span>Нет подключения</span>
</span>
</div>
<div class="app-bar-actions">
<button class="icon-btn" onclick="toggleWidgetsSidebar()" title="Виджеты">
<span class="material-icons-round">dashboard</span>
</button>
<button class="icon-btn primary" onclick="focusChat()" title="Чат с AI">
<span class="material-icons-round">smart_toy</span>
</button>
</div>
</div>

<!-- Main Content -->
<div class="main-content">
<!-- AI Assistant Panel - Main Screen -->
<div id="aiPanel" class="ai-panel">
<div class="ai-header">
<div class="ai-avatar">
<span class="material-icons-round">auto_awesome</span>
</div>
<h2 class="ai-greeting">Привет! Я ваш AI помощник</h2>
<p class="ai-subtitle">Управляйте домом голосом или текстом</p>
</div>
<div id="chatMessages" class="chat-messages"></div>
<div class="input-area">
<button id="micBtn" class="icon-btn" onclick="toggleVoice()" title="Голосовой ввод">
<span class="material-icons-round">mic</span>
</button>
<input type="text" id="chatInput" class="chat-input" placeholder="Например: включи свет в гостиной..." onkeypress="if(event.key==='Enter')sendMessage()">
<button class="send-btn" onclick="sendMessage()">
<span class="material-icons-round">send</span>
</button>
</div>
</div>

<!-- Widgets Sidebar -->
<div id="widgetsSidebar" class="widgets-sidebar">
<div class="widgets-header">
<span class="widgets-title"><span class="material-icons-round">dashboard</span>Быстрый доступ</span>
<button class="icon-btn" onclick="openAddWidgetDialog()" title="Добавить виджет">
<span class="material-icons-round">add</span>
</button>
</div>
<div class="widgets-content">
<div id="widgetsGrid" class="widgets-grid"></div>
</div>
<div class="quick-actions">
<div class="quick-actions-title">Сценарии</div>
<div class="quick-buttons">
<button class="quick-btn" onclick="quickCmd('включи режим кино')"><span class="material-icons-round">movie</span>Кино</button>
<button class="quick-btn" onclick="quickCmd('выключи всё')"><span class="material-icons-round">power_off</span>Выкл всё</button>
<button class="quick-btn" onclick="quickCmd('доброе утро')"><span class="material-icons-round">wb_sunny</span>Утро</button>
<button class="quick-btn" onclick="quickCmd('спокойной ночи')"><span class="material-icons-round">nightlight</span>Ночь</button>
</div>
</div>
</div>
</div>

<script>
const $=id=>document.getElementById(id);
let allDevices=[];
let widgets=[];
let isListening=false;
let recognition=null;
let chatInitialized=false;

// Load widgets from localStorage
function loadWidgets(){
try{
const saved=localStorage.getItem('home_widgets');
widgets=saved?JSON.parse(saved):[];
}catch(e){widgets=[];}
renderWidgets();
}

function saveWidgets(){
localStorage.setItem('home_widgets',JSON.stringify(widgets));
}

// Speech Recognition
if('webkitSpeechRecognition' in window||'SpeechRecognition' in window){
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
recognition=new SR();
recognition.continuous=false;
recognition.interimResults=true;
recognition.lang='ru-RU';
recognition.onresult=e=>{
let final='';
for(let i=e.resultIndex;i<e.results.length;i++){
if(e.results[i].isFinal)final+=e.results[i][0].transcript;
}
if(final){$('chatInput').value=final;sendMessage();}
};
recognition.onend=()=>{isListening=false;$('micBtn').querySelector('span').textContent='mic';};
recognition.onerror=e=>{showSnackbar('❌ Ошибка голоса: '+e.error);isListening=false;$('micBtn').querySelector('span').textContent='mic';};
}

function toggleVoice(){
if(!recognition){showSnackbar('Голос не поддерживается');return;}
if(isListening){recognition.stop();}else{recognition.start();isListening=true;$('micBtn').querySelector('span').textContent='mic_off';}
}

function showSnackbar(msg){
const s=$('snackbar');
if(!s){
const snackbar=document.createElement('div');
snackbar.id='snackbar';
snackbar.className='snackbar';
document.body.appendChild(snackbar);
}
$('snackbar').textContent=msg;
$('snackbar').classList.add('show');
setTimeout(()=>$('snackbar').classList.remove('show'),3000);
}

function addMessage(text,type){
const div=document.createElement('div');
div.className='message '+type;
if(type==='typing'){
div.innerHTML='<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
}
else{
div.textContent=text;
}
$('chatMessages').appendChild(div);
$('chatMessages').scrollTop=$('chatMessages').scrollHeight;
}

function removeTypingIndicator(){
const typing=$('chatMessages').querySelector('.message.typing');
if(typing)typing.remove();
}

function quickCmd(cmd){
$('chatInput').value=cmd;
sendMessage();
}

async function sendMessage(){
const q=$('chatInput').value.trim();
if(!q)return;
$('chatInput').value='';
addMessage(q,'user');
addMessage('','typing');
try{
const r=await fetch('/api/ai/query',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:[{role:'user',content:q}],system_prompt:'Ты помощник умного дома. Отвечай кратко и дружелюбно. Для управления устройствами вызывай API. Форматируй ответы красиво, используй <strong> для выделения важного.'})});
const data=await r.json();
removeTypingIndicator();
if(data.error){addMessage('❌ '+data.error,'ai');return;}
const reply=data.choices?.[0]?.message?.content||JSON.stringify(data);
addMessage(reply,'ai');
}catch(e){removeTypingIndicator();addMessage('❌ Ошибка: '+e.message,'ai');}
}

function focusChat(){
$('chatInput').focus();
}

function toggleWidgetsSidebar(){
$('widgetsSidebar').classList.toggle('hidden');
}

async function doHealth(){
try{
const h=await fetch('/api/health').then(r=>r.json());
const badge=$('statusBadge');
if(h.status==='ok'&&h.ha==='configured'){
badge.className='status-chip ok';
badge.innerHTML='<span class="material-icons-round" style="font-size:16px">check_circle</span><span>HA подключен</span>';
loadAllDevices();
loadWidgets();
if(!chatInitialized){
addMessage('👋 Привет! Я ваш AI-помощник для умного дома.','ai');
addMessage('Я могу управлять устройствами, отвечать на вопросы о состоянии дома и помогать со сценариями.','ai');
chatInitialized=true;
}
showSnackbar('✅ Система готова');
}else{
badge.className='status-chip err';
badge.innerHTML='<span class="material-icons-round" style="font-size:16px">error</span><span>Нет подключения к HA</span>';
showSnackbar('⚠️ Проверьте настройки Home Assistant');
}
}catch(e){
const badge=$('statusBadge');
badge.className='status-chip err';
badge.innerHTML='<span class="material-icons-round" style="font-size:16px">error</span><span>Ошибка соединения</span>';
showSnackbar('❌ Ошибка: '+e.message);
}
}

async function loadAllDevices(){
try{
const e=await fetch('/api/ha/entities').then(r=>r.json());
if(!Array.isArray(e))return;
allDevices=e.filter(d=>['light','switch','climate','cover','fan','lock'].some(domain=>d.entity_id.startsWith(domain+'.')));
renderWidgets();
}catch(err){console.error('Failed to load devices:',err);showSnackbar('❌ Не удалось загрузить устройства');}
}

function getDeviceIcon(domain,isOn){
const icons={light:'lightbulb',switch:'power',climate:'thermostat',cover:'blinds',fan:'fan',lock:'lock'};
return icons[domain]||(isOn?'check_circle':'circle');
}

function getStateText(state,domain){
const states={on:'Вкл',off:'Выкл',open:'Открыто',closed:'Закрыто',heating:'Нагрев',cooling:'Охлаждение',idle:'Ожидание',locked:'Заперто',unlocked:'Открыт'};
return states[state]||state;
}

function canToggle(domain){
return['light','switch','fan','lock'].includes(domain);
}

function renderWidgets(){
const grid=$('widgetsGrid');
if(!grid)return;
grid.innerHTML='';
if(widgets.length===0){
grid.innerHTML=`
<div class="empty-state">
<span class="material-icons-round">dashboard</span>
<div class="empty-state-title">Нет виджетов</div>
<div class="empty-state-text">Нажмите + чтобы добавить устройства</div>
</div>
`;
return;
}
widgets.forEach((w,idx)=>{
const dev=allDevices.find(d=>d.entity_id===w.entityId);
if(!dev)return;
const isOn=dev.state==='on'||dev.state==='open'||dev.state==='heating';
const card=document.createElement('div');
card.className='widget-card'+(isOn?' active':'');
card.innerHTML=`
<div class="widget-remove" onclick="event.stopPropagation();removeWidget(${idx})">
<span class="material-icons-round">close</span>
</div>
<div class="widget-icon"><span class="material-icons-round">${getDeviceIcon(w.domain,isOn)}</span></div>
<div class="widget-info">
<div class="widget-name">${w.name||dev.attributes?.friendly_name||w.entityId}</div>
<div class="widget-state">${getStateText(dev.state,w.domain)}</div>
</div>
<button class="widget-action-btn" onclick="event.stopPropagation();toggleDevice('${w.entityId}',this)">
<span class="material-icons-round">${isOn?'toggle_on':'toggle_off'}</span>
</button>
`;
card.onclick=()=>toggleDevice(w.entityId,card);
grid.appendChild(card);
});
grid.innerHTML+='<div class="add-widget-card" onclick="openAddWidgetDialog()"><span class="material-icons-round">add_circle</span><span>Добавить устройство</span></div>';
}

function openAddWidgetDialog(){
const dialog=document.createElement('div');
dialog.id='addWidgetDialog';
dialog.className='dialog-overlay show';
dialog.innerHTML=`
<div class="dialog">
<h2 class="dialog-title">Добавить виджет</h2>
<p class="dialog-subtitle">Выберите устройство для быстрого доступа</p>
<div id="addWidgetList" class="dialog-list"></div>
<div class="dialog-actions">
<button class="btn-text" onclick="closeAddWidgetDialog()">Отмена</button>
</div>
</div>
`;
document.body.appendChild(dialog);
const list=$('addWidgetList');
list.innerHTML='';
const categories=[
{domain:'light',name:'💡 Освещение'},
{domain:'switch',name:'🔌 Розетки'},
{domain:'climate',name:'🌡 Климат'},
{domain:'cover',name:'🪟 Шторы'},
{domain:'fan',name:'💨 Вентиляция'},
{domain:'lock',name:'🔒 Замки'}
];
categories.forEach(cat=>{
const devices=allDevices.filter(d=>d.entity_id.startsWith(cat.domain+'.'));
if(devices.length===0)return;
const header=document.createElement('div');
header.style.cssText='font-size:.75rem;font-weight:600;color:var(--md-sys-color-on-surface-variant);text-transform:uppercase;padding:12px 0 8px;border-bottom:1px solid var(--md-sys-color-surface-variant);margin-top:12px';
header.textContent=cat.name;
list.appendChild(header);
devices.forEach(dev=>{
const item=document.createElement('div');
item.className='device-item';
item.style.cssText='background:var(--md-sys-color-surface-variant);border-radius:var(--md-shape-corner-medium);padding:12px;margin:4px 0;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:background .2s';
item.innerHTML=`
<div class="device-info">
<div class="device-name" style="font-weight:500;font-size:.9rem;color:var(--md-sys-color-on-surface)">${dev.attributes?.friendly_name||dev.entity_id}</div>
<div class="device-status" style="font-size:.75rem;color:var(--md-sys-color-on-surface-variant);margin-top:2px">${getStateText(dev.state,cat.domain)}</div>
</div>
<span class="material-icons-round" style="color:var(--md-sys-color-primary)">add_circle</span>
`;
item.onclick=()=>addWidget(dev);
item.onmouseover=()=>item.style.background='var(--md-sys-color-secondary-container)';
item.onmouseout=()=>item.style.background='var(--md-sys-color-surface-variant)';
list.appendChild(item);
});
});
}

function closeAddWidgetDialog(){
const dialog=$('addWidgetDialog');
if(dialog){
dialog.classList.remove('show');
setTimeout(()=>dialog.remove(),300);
}
}

function addWidget(dev){
if(widgets.some(w=>w.entityId===dev.entity_id)){
showSnackbar('Устройство уже в виджетах');
return;
}
widgets.push({entityId:dev.entity_id,domain:dev.entity_id.split('.')[0],name:dev.attributes?.friendly_name});
saveWidgets();
renderWidgets();
closeAddWidgetDialog();
showSnackbar('✅ Виджет добавлен');
}

function removeWidget(idx){
widgets.splice(idx,1);
saveWidgets();
renderWidgets();
showSnackbar('Виджет удалён');
}

async function toggleDevice(entityId,el){
const domain=entityId.split('.')[0];
const service=domain==='lock'?(allDevices.find(d=>d.entity_id===entityId)?.state==='locked'?'unlock':'lock'):'toggle';
try{
const r=await fetch('/api/ha/call_service',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({domain,service,data:{entity_id:entityId}})});
const data=await r.json();
if(data?.status==='ok'){
setTimeout(()=>refreshDeviceState(entityId),500);
setTimeout(()=>refreshDeviceState(entityId),1500);
}else{
showSnackbar('❌ Ошибка выполнения');
}
}catch(e){showSnackbar('❌ Ошибка: '+e.message);}
}

async function refreshDeviceState(entityId){
try{
const state=await fetch(`/api/ha/entity/${entityId}`).then(r=>r.json());
if(state){
const dev=allDevices.find(d=>d.entity_id===entityId);
if(dev)dev.state=state.state;
renderWidgets();
}
}catch(e){console.error(e);}
}

// Init
loadWidgets();
doHealth();
setInterval(doHealth,60000);
setInterval(()=>loadAllDevices(),30000);
</script>
</body>
</html>
