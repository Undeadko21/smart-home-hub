services:
  kiosk:
    image: smart-kiosk:latest
    pull_policy: never
    container_name: smart-kiosk
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATA_DIR: /app/data
      HA_TOKEN: ""
      DEEPSEEK_KEY: ""
    volumes:
      - type: bind
        source: /mnt/storage/Anatoliy/kiosk-data
        target: /app/data
        bind:
          create_host_path: true
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
