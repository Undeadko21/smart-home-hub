services:
  kiosk:
    image: smart-kiosk:latest
    pull_policy: never
    container_name: ${COMPOSE_PROJECT_NAME:-smart-kiosk}
    restart: ${RESTART_POLICY:-unless-stopped}
    ports:
      - "${PORT:-8080}:8080"
    environment:
      DATA_DIR: /app/data
      HA_URL: "${HA_URL:-}"
      HA_TOKEN: "${HA_TOKEN:-}"
      DEEPSEEK_KEY: "${DEEPSEEK_KEY:-}"
    volumes:
      - type: bind
        source: ${DATA_PATH:-/mnt/data/smart-kiosk}
        target: /app/data
        bind:
          create_host_path: true
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '${CPU_LIMIT:-1.0}'
          memory: ${MEMORY_LIMIT:-512M}
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
      disable: ${DISABLE_HEALTHCHECK:-false}
    logging:
      driver: ${LOG_DRIVER:-json-file}
      options:
        max-size: "${MAX_LOG_SIZE:-10m}"
        max-file: "${MAX_LOG_FILES:-3}"
